<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SMART DM - Sistem Monitoring</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1"
      }
    }
  </script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-[#0f172a]">
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect } from 'react';
    import { createRoot } from 'react-dom/client';
    import { Upload, Download, Save } from 'lucide-react';

    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwGAEysRr9D4XPyANMMkqB4uLy-YfIzHfNsDLGYXkkqf8cxUqusFqhz7tyUmubllE_H/exec'; 

    const App = () => {
      const [labFilesData, setLabFilesData] = useState([]);
      const [prolanisFilesData, setProlanisFilesData] = useState([]);
      const [isProcessing, setIsProcessing] = useState(false);
      const [isSaving, setIsSaving] = useState(false);
      const [activeTab, setActiveTab] = useState('LAB'); 

      const months = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];

      useEffect(() => {
        const script = document.createElement('script');
        script.src = "https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js";
        script.async = true;
        document.head.appendChild(script);
      }, []);

      const getCellValue = (ws, r, c) => {
        const cell = ws[window.XLSX.utils.encode_cell({ r, c })];
        return cell ? (cell.w || String(cell.v || "")) : "";
      };

      const handleUpload = async (e, type) => {
        const files = Array.from(e.target.files);
        if (!files.length) return;
        setIsProcessing(true);
        
        const process = async (file) => {
          const buffer = await file.arrayBuffer();
          const wb = window.XLSX.read(buffer, { type: 'array' });
          const sheet = wb.Sheets[wb.SheetNames[0]];
          const range = window.XLSX.utils.decode_range(sheet['!ref']);
          const data = [];
          
          if (type === 'LAB') {
            for (let r = 10; r <= range.e.r; r += 2) {
              const bulan = getCellValue(sheet, r, 1);
              const nama = getCellValue(sheet, r, 5) || getCellValue(sheet, r, 4);
              const status = getCellValue(sheet, r, 21);
              const bpjs = getCellValue(sheet, r, 17);
              if (bpjs) data.push({ bulan, nama, status, bpjs });
            }
          } else {
            for (let r = 13; r <= range.e.r; r++) {
              data.push({ K: getCellValue(sheet, r, 9) }); // Kolom K
            }
          }
          return { fileName: file.name, data };
        };

        const results = await Promise.all(files.map(process));
        if (type === 'LAB') setLabFilesData(prev => [...prev, ...results]);
        else setProlanisFilesData(prev => [...prev, ...results]);
        setIsProcessing(false);
      };

      const saveToGoogleSheets = async () => {
        setIsSaving(true);
        const validBpjs = new Set(prolanisFilesData.flatMap(f => f.data.map(d => String(d.K).trim())));
        const merged = {};

        labFilesData.flatMap(f => f.data).forEach(row => {
          const bpjs = String(row.bpjs).trim();
          if (!merged[bpjs]) merged[bpjs] = { bpjs, nama: row.nama, status: {} };
          merged[bpjs].status[row.bulan] = row.status;
        });

        const finalData = Object.values(merged)
          .filter(r => validBpjs.has(r.bpjs))
          .map(r => ({ 'No BPJS': r.bpjs, 'Nama': r.nama, ...r.status }));

        try {
          await fetch(SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({ sheetName: 'Pelayanan', data: finalData })
          });
          alert("Data berhasil dikirim!");
        } catch (e) { alert("Gagal kirim data"); }
        setIsSaving(false);
      };

      return (
        <div className="min-h-screen bg-[#0f172a] text-white p-10">
          <header className="flex justify-between items-center mb-10">
            <h1 className="text-3xl font-black">SMART DM</h1>
            <div className="flex gap-2">
              <button onClick={() => setActiveTab('LAB')} className="bg-indigo-600 px-4 py-2 rounded-lg">LAB</button>
              <button onClick={() => setActiveTab('PROLANIS')} className="bg-emerald-600 px-4 py-2 rounded-lg">PROLANIS</button>
            </div>
          </header>
          
          {activeTab === 'LAB' ? (
            <div className="space-y-4">
              <input type="file" multiple webkitdirectory="true" onChange={(e) => handleUpload(e, 'LAB')} className="bg-white/10 p-4 rounded-xl"/>
              <button onClick={saveToGoogleSheets} className="bg-blue-600 px-6 py-4 rounded-xl flex items-center gap-2">
                <Save/> Simpan ke Sheets
              </button>
            </div>
          ) : (
            <input type="file" multiple webkitdirectory="true" onChange={(e) => handleUpload(e, 'PROLANIS')} className="bg-white/10 p-4 rounded-xl"/>
          )}
          
          {(isProcessing || isSaving) && <div className="fixed inset-0 bg-black/80 flex items-center justify-center">Loading...</div>}
        </div>
      );
    };
    createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
