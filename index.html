      33% { transform: translate(30px, -50px) scale(1.1); }
      66% { transform: translate(-20px, 20px) scale(0.9); }

<body>

  <script type="text/babel" data-presets="env,react-classic">
    const { useState, useEffect, useRef } = React;
    
    // --- CUSTOM LUCIDE ICONS WRAPPER ---
    const iconMap = {
      FileUp: 'file-up', Download: 'download', Search: 'search', Trash2: 'trash-2',
      FileSpreadsheet: 'file-spreadsheet', CheckCircle2: 'check-circle-2', AlertCircle: 'alert-circle',
      Loader2: 'loader-2', Filter: 'filter', Users: 'users', Activity: 'activity', FolderOpen: 'folder-open',
      AlertTriangle: 'alert-triangle', ChevronRight: 'chevron-right', RefreshCw: 'refresh-cw',
      UploadCloud: 'upload-cloud', Database: 'database', Check: 'check', ArrowRight: 'arrow-right',
      ArrowLeft: 'arrow-left', CloudUpload: 'cloud-upload', BarChart3: 'bar-chart-3', LayoutDashboard: 'layout-dashboard',
      Copy: 'copy', Home: 'home', User: 'user', Lock: 'lock', LogIn: 'log-in', ExternalLink: 'external-link',
      FolderUp: 'folder-up', FilePlus: 'file-plus'
    };

    const createLucideIcon = (name) => {
      const kebabName = iconMap[name];
      return ({ className }) => {
        const spanRef = React.useRef(null);
        React.useEffect(() => {
          if (spanRef.current && window.lucide) {
            spanRef.current.innerHTML = `<i data-lucide="${kebabName}" class="${className || ''}"></i>`;
            window.lucide.createIcons({
              root: spanRef.current
            });
          }
        }, [className]);
        return <span ref={spanRef} style={{ display: 'contents' }} />;
      };
    };

    // Mendaftarkan komponen Icon untuk JSX
    const FileUp = createLucideIcon('FileUp');
    const Download = createLucideIcon('Download');
    const Search = createLucideIcon('Search');
    const Trash2 = createLucideIcon('Trash2');
    const FileSpreadsheet = createLucideIcon('FileSpreadsheet');
    const CheckCircle2 = createLucideIcon('CheckCircle2');
    const AlertCircle = createLucideIcon('AlertCircle');
    const Loader2 = createLucideIcon('Loader2');
    const Filter = createLucideIcon('Filter');
    const Users = createLucideIcon('Users');
    const Activity = createLucideIcon('Activity');
    const FolderOpen = createLucideIcon('FolderOpen');
    const AlertTriangle = createLucideIcon('AlertTriangle');
    const ChevronRight = createLucideIcon('ChevronRight');
    const RefreshCw = createLucideIcon('RefreshCw');
    const UploadCloud = createLucideIcon('UploadCloud');
    const Database = createLucideIcon('Database');

    const ArrowLeft = createLucideIcon('ArrowLeft');

    /**

    // Komponen Logo Khusus
    const DMLogo = ({ className }) => (

          <path d="M0 10L22.5 20L45 10" stroke="#E2E8F0" strokeWidth="4" strokeLinejoin="round"/>

    // --- KOMPONEN CHART ---
    const ChartCard = ({ title, labels, data, color }) => {
      const canvasRef = useRef(null);
      const chartInstance = useRef(null);

      useEffect(() => {
        if (!canvasRef.current || !window.Chart) return;
        if (chartInstance.current) {
          chartInstance.current.destroy();
        }

        const ctx = canvasRef.current.getContext('2d');
        chartInstance.current = new window.Chart(ctx, {
          type: 'bar',
          data: {
            labels: labels,
            datasets: [{
              label: title,
              data: data,
              backgroundColor: color + '90',
              borderColor: color,
              borderWidth: 2,
              borderRadius: 6
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { display: false },
              title: { 
                display: true, 
                text: title, 
                font: { size: 14, family: 'system-ui', weight: 'bold' },
                color: '#1e293b',
                padding: { bottom: 20 }
              }
            },
            scales: {
              y: { beginAtZero: true, grid: { color: 'rgba(0,0,0,0.05)' } },
              x: { grid: { display: false } }
            }
          }
        });

        return () => {
          if (chartInstance.current) chartInstance.current.destroy();
        };
      }, [labels, data, title, color]);

      return (
        <div className="glass-panel p-5 md:p-6 rounded-[2rem] border border-white/60 shadow-xl relative h-[300px] flex items-center justify-center hover:shadow-2xl hover:-translate-y-1 transition-all duration-300 bg-white/40">
          <canvas ref={canvasRef}></canvas>
        </div>
      );
    };

    const App = () => {
      // Global State
      const [step, setStep] = useState(1); 
      const [toast, setToast] = useState({ show: false, msg: '', sub: '', type: 'success' });
      const [isProcessing, setIsProcessing] = useState(false);
      const [isSavingToSheet, setIsSavingToSheet] = useState(false);
      
      // Dashboard State
      const [showDashboard, setShowDashboard] = useState(false);
      const [dashboardData, setDashboardData] = useState(null);

      // Transition States
      const [isAutoTransitioning, setIsAutoTransitioning] = useState(false);

      // Modal State
      const [confirmModal, setConfirmModal] = useState({
        show: false, title: '', message: '', onConfirm: null, type: 'warning'
      });

      // Data State
      const [database, setDatabase] = useState([]);
      const [prolanisData, setProlanisData] = useState([]);
      const [searchQuery, setSearchQuery] = useState('');

      // --- UTILITIES ---
      const showToast = (msg, sub = 'Berhasil', type = 'success') => {
        setToast({ show: true, msg, sub, type });
        setTimeout(() => setToast({ show: false, msg: '', sub: '', type: 'success' }), 4000);
      };

      const triggerConfirm = (title, message, onConfirm, type = 'warning') => {
        setConfirmModal({ show: true, title, message, onConfirm, type });
      };

      const closeConfirm = () => {
        setConfirmModal({ ...confirmModal, show: false });
      };

      const resetAllData = () => {
        setDatabase([]);
        setProlanisData([]);
        setStep(1);
        setSearchQuery('');
        setShowDashboard(false);
        setDashboardData(null);
      };

      // --- LOGIC: MEMBUAT DASHBOARD SECARA LANGSUNG ---
      const loadDashboardDirectly = () => {
        setIsProcessing(true);
        if (typeof google !== 'undefined' && google.script) {
          google.script.run
            .withSuccessHandler((rekapRes) => {
              setIsProcessing(false);
              if(rekapRes && rekapRes.labels && rekapRes.values) {
                setDashboardData(rekapRes);
                setShowDashboard(true);
                setStep(3);
                showToast("Dashboard Terbuka", "Data berhasil diambil dari Google Sheets", "success");
              } else {
                showToast("Info Dashboard", "Data grafik rekap belum tersedia.", "warning");
              }
            })
            .withFailureHandler((err) => {
              setIsProcessing(false);
              showToast("Error Load Grafik", err.message, "error");
            })
            .getRekapData();
        } else {
          setTimeout(() => {
            setIsProcessing(false);
            setDashboardData({
              labels: ['Jan', 'Feb', 'Mar', 'Apr', 'Mei', 'Jun', 'Jul', 'Agu', 'Sep', 'Okt', 'Nov', 'Des', 'Q1', 'Q2', 'Q3', 'Q4', 'YTD', 'Q1', 'Q2', 'Q3', 'Q4', 'YTD', 'Q1', 'Q2', 'Q3', 'Q4', 'YTD'],
              values: Array.from({length: 27}, () => Math.floor(Math.random() * 100 + 20)),
              totalPatients: database.length > 0 ? database.length : 154,
              currentMonthVisits: database.length > 0 ? database.filter(p => p.months[new Date().getMonth()] !== '-').length : 45
            });
            setShowDashboard(true);
            setStep(3);
            showToast("Mode Simulasi", "Berhasil memuat Dashboard Simulasi", "success");
          }, 1000);
        }
      };

      // --- LOGIC: FUNGSI RESET DATABASE KE GAS ---
      const handleResetDatabase = () => {
        triggerConfirm(
          'Reset Data Spreadsheet', 
          'PERINGATAN: Tindakan ini akan menghapus semua isian pada kolom C-R pada Sheet "Data" di Google Spreadsheet Anda. Yakin ingin melanjutkan?', 
          () => {
            setIsProcessing(true);
            if (typeof google !== 'undefined' && google.script) {
              google.script.run
                .withSuccessHandler((res) => {
                  setIsProcessing(false);
                  resetAllData();
                  showToast("Berhasil Dikosongkan", res, "success");
                })

                  setIsProcessing(false);
                  showToast("Error", err.message, "error");
                })
                .resetDataSheet();
            } else {
              setTimeout(() => {
                setIsProcessing(false);
                resetAllData();
                showToast("Mode Simulasi", "DATABASE BERHASIL DIKOSONGKAN", "success");

            closeConfirm();
          }, 
          'danger'

      };

      // --- LOGIC: FUNGSI SALIN LAPORAN REKAP GAS ---
      const handleCopyReport = () => {
        setIsProcessing(true);
        if (typeof google !== 'undefined' && google.script) {
          google.script.run
            .withSuccessHandler((res) => {
              setIsProcessing(false);
              if (res === "Error") {
                showToast("Gagal Menyalin", "Data rekap gagal diambil.", "error");

              }
              const textArea = document.createElement("textarea");

              document.body.appendChild(textArea);

                document.execCommand('copy');

              } catch (err) {
                showToast("Gagal Menyalin", "Browser Anda memblokir fungsi copy otomatis.", "error");

            })
            .withFailureHandler((err) => {
              setIsProcessing(false);
              showToast("Error", err.message, "error");
            })
            .copyRekapReport();
        } else {
          setTimeout(() => {
            setIsProcessing(false);
            showToast("Mode Simulasi", "Menyalin data rekap (Simulasi)...", "success");
          }, 500);

      // --- LOGIC: BUKA LINK PASTE LAPORAN ---
      const handleOpenPasteLink = () => {
        setIsProcessing(true);
        if (typeof google !== 'undefined' && google.script) {
          google.script.run
            .withSuccessHandler((link) => {

          }, 500);
        }
      };

      // --- LOGIC 1: MONITORING MATRIKS ---
      const getMonthIndex = (value) => {
        if (!value) return -1;
        const strVal = String(value).trim();
        const parts = strVal.split(/[-.\/]/);
        if (parts.length >= 2) {
          const mPart = parseInt(parts[1], 10);
          if (mPart >= 1 && mPart <= 12) return mPart - 1;
        }
        const cleanDigits = strVal.replace(/[^0-9]/g, '');
        if (cleanDigits.length === 6) {
          const mPart = parseInt(cleanDigits.substring(2, 4), 10);
          if (mPart >= 1 && mPart <= 12) return mPart - 1;
        }
        let date;
        if (value instanceof Date) date = value;
        else if (typeof value === 'number') date = new Date(Math.round((value - 25569) * 86400 * 1000));
        else { const parsed = new Date(value); if (!isNaN(parsed.getTime())) date = parsed; }
        return date && !isNaN(date.getTime()) ? date.getMonth() : -1;
      };

      const getCellValueDeep = (worksheet, r, c) => {
        const XLSX = window.XLSX;
        if (!XLSX) return "";
        if (worksheet['!merges']) {
          for (const merge of worksheet['!merges']) {
            if (r >= merge.s.r && r <= merge.e.r && c >= merge.s.c && c <= merge.e.c) {
              const firstCell = worksheet[XLSX.utils.encode_cell({ r: merge.s.r, c: merge.s.c })];
              return firstCell ? (firstCell.w || firstCell.v || "") : "";
            }
          }
        }
        const cell = worksheet[XLSX.utils.encode_cell({ r, c })];
        return cell ? (cell.w || (cell.v !== undefined ? String(cell.v) : "")) : "";
      };

      // --- LOGIC PROLANIS ---
      const handleProlanisUpload = async (e) => {
        const files = Array.from(e.target.files);
        if (!files.length || !window.XLSX) return;
        setIsProcessing(true);
        let newData = [...prolanisData];
        let totalNew = 0;

        try {
          const validFiles = files.filter(file => file.name.match(/\.(xlsx|xls|csv)$/i));

          if (validFiles.length === 0) {
            showToast('Gagal', 'Tidak ada file Excel (.xlsx/.xls/.csv) yang valid', 'error');
            return;
          }

          for (const file of validFiles) {
            const data = await file.arrayBuffer();
            const workbook = window.XLSX.read(new Uint8Array(data), { type: 'array', cellDates: true, cellText: true });
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            if (!sheet || !sheet['!ref']) continue;
            const range = window.XLSX.utils.decode_range(sheet['!ref']);

            // Membaca mulai baris ke-14 (indeks array 13)
            for (let r = 13; r <= range.e.r; r++) {
              const valC = getCellValueDeep(sheet, r, 2); // Kolom C = Index 2

      const handleMonitoringUpload = async (e) => {
        const files = Array.from(e.target.files);
        if (!files.length || !window.XLSX) return;
        setIsProcessing(true);
        let updatedDatabase = [...database];
        let totalNew = 0;
        let totalUpdated = 0;

        try {
          const validFiles = files.filter(file => {
            const isExcel = file.name.match(/\.(xlsx|xls|csv)$/i);
            const isLaporan = file.name.toLowerCase().includes('laporan'); 
            return isExcel && isLaporan;
          });

          if (validFiles.length === 0) {
            showToast('Gagal', 'Tidak ada file "Laporan" yang valid di dalam folder (.xlsx/.xls/.csv)', 'error');
            return;
          }

          for (const file of validFiles) {
            const data = await file.arrayBuffer();
            const workbook = window.XLSX.read(new Uint8Array(data), { type: 'array', cellDates: true, cellText: true });
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            if (!sheet || !sheet['!ref']) continue;
            const range = window.XLSX.utils.decode_range(sheet['!ref']);

            for (let r = 10; r <= range.e.r; r += 2) {
              const rawB = getCellValueDeep(sheet, r, 1);
              const rawF = getCellValueDeep(sheet, r, 5) || getCellValueDeep(sheet, r, 4) || getCellValueDeep(sheet, r, 6);
              const rawV = getCellValueDeep(sheet, r, 21);
              
              if (!rawF || String(rawF).trim() === "-" || String(rawF).trim() === "Data_Pasien") continue;
              
              const monthIdx = getMonthIndex(rawB);
              const patientId = rawF;
              const existingIndex = updatedDatabase.findIndex(p => String(p.id) === String(patientId));

              if (existingIndex !== -1) {
                if (monthIdx !== -1) updatedDatabase[existingIndex].months[monthIdx] = rawV || "V";
                totalUpdated++;
              } else {
                const newPatient = {
                  id: patientId,
                  name: rawF,
                  info: file.name,
                  months: new Array(12).fill('-'),
                  diagnosaDate: '-' 
                };
                if (monthIdx !== -1) newPatient.months[monthIdx] = rawV || "V";
                updatedDatabase.push(newPatient);
                totalNew++;
              }
            }
          }
          setDatabase(updatedDatabase);
          showToast('Matriks Berhasil Diperbarui', `${totalNew} Baru, ${totalUpdated} Diperbarui`, 'success');
          
          if (step === 1 && (totalNew > 0 || totalUpdated > 0)) {
            setIsAutoTransitioning(true);
            setTimeout(() => {
              showToast('Transisi Otomatis', 'Menyiapkan dashboard ringkasan...', 'success');
            }, 500);
            setTimeout(() => {
              setStep(3); 
              setIsAutoTransitioning(false);
            }, 2500);
          }

        } catch (err) {
          showToast('Gagal memproses file', 'Kesalahan format', 'error');
        } finally {
          setIsProcessing(false);
          e.target.value = null;
        }
      };
