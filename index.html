<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMART DM - Automated Flow</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- SheetJS (Excel) -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    
    <!-- Konfigurasi Import Map untuk mencegah Error #31 (Multiple React Instances) -->
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.344.0?deps=react@18.2.0,react-dom@18.2.0"
      }
    }
    </script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        body { margin: 0; background-color: #020617; color: #f8fafc; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
        ::-webkit-scrollbar { height: 6px; width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
        .glass-panel { background: rgba(30, 41, 59, 0.5); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-slate-900 via-[#020617] to-[#020617] min-h-screen">
    <div id="root"></div>
    
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { 
          Upload, FileSpreadsheet, Download, FileText, FolderOpen, 
          Database, Activity, Loader2, Info, LayoutDashboard, CheckCircle2, 
          Stethoscope, Users, BarChart3, AlertCircle
        } from 'lucide-react';

        const App = () => {
          const [labFilesData, setLabFilesData] = useState([]);
          const [prolanisFilesData, setProlanisFilesData] = useState([]);
          const [filteredLabData, setFilteredLabData] = useState([]); 
          const [isProcessing, setIsProcessing] = useState(false);
          const [activeTab, setActiveTab] = useState('LAB'); 

          const months = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];

          // Logika Filter Data
          useEffect(() => {
            if (labFilesData.length > 0 && prolanisFilesData.length > 0) {
              const prolanisBPJSSuffixes = new Set();
              prolanisFilesData.forEach(file => {
                file.data.forEach(row => {
                  const bpjs = String(row['No BPJS'] || "").replace(/[^0-9a-zA-Z]/g, '');
                  if (bpjs.length >= 8) prolanisBPJSSuffixes.add(bpjs.slice(-8));
                });
              });

              const newFilteredLab = labFilesData.map(file => {
                return {
                  ...file,
                  data: file.data.filter(row => {
                    const labBpjs = String(row.Data_R || "").replace(/[^0-9a-zA-Z]/g, '');
                    return labBpjs.length >= 8 && prolanisBPJSSuffixes.has(labBpjs.slice(-8));
                  })
                };
              }).filter(file => file.data.length > 0); 

              setFilteredLabData(newFilteredLab);
            } else {
              setFilteredLabData(labFilesData);
            }
          }, [labFilesData, prolanisFilesData]);

          const getMonthName = (value) => {
            if (!value) return "-";
            let monthIndex = -1;
            const strVal = String(value).trim();
            const parts = strVal.split(/[-./]/);
            if (parts.length >= 2) {
              const mPart = parseInt(parts[1], 10);
              if (mPart >= 1 && mPart <= 12) monthIndex = mPart - 1;
            }
            if (monthIndex === -1) {
              const cleanDigits = strVal.replace(/[^0-9]/g, '');
              if (cleanDigits.length === 6) {
                const mPart = parseInt(cleanDigits.substring(2, 4), 10);
                if (mPart >= 1 && mPart <= 12) monthIndex = mPart - 1;
              }
            }
            if (monthIndex === -1) {
              let date;
              if (value instanceof Date) date = value;
              else if (typeof value === 'number') date = new Date(Math.round((value - 25569) * 86400 * 1000));
              else { const parsed = new Date(value); if (!isNaN(parsed.getTime())) date = parsed; }
              if (date && !isNaN(date.getTime())) monthIndex = date.getMonth();
            }
            return monthIndex >= 0 && monthIndex <= 11 ? months[monthIndex] : strVal || "-";
          };

          const getCellValue = (worksheet, r, c) => {
            const XLSX = window.XLSX;
            if (!XLSX) return "";
            
            let targetCell = worksheet[XLSX.utils.encode_cell({ r, c })];
            
            if (worksheet['!merges']) {
              for (const merge of worksheet['!merges']) {
                if (r >= merge.s.r && r <= merge.e.r && c >= merge.s.c && c <= merge.e.c) {
                  targetCell = worksheet[XLSX.utils.encode_cell({ r: merge.s.r, c: merge.s.c })];
                  break;
                }
              }
            }
            
            if (!targetCell) return "";
            if (targetCell.w !== undefined) return String(targetCell.w);
            if (targetCell.v !== undefined) {
               if (targetCell.v instanceof Date) {
                   const d = targetCell.v;
                   return `${d.getDate().toString().padStart(2, '0')}/${(d.getMonth() + 1).toString().padStart(2, '0')}/${d.getFullYear()}`;
               }
               return String(targetCell.v);
            }
            return "";
          };

          const processLabFile = (file) => {
            return new Promise((resolve) => {
              const reader = new FileReader();
              reader.onload = (e) => {
                const data = new Uint8Array(e.target.result);
                const workbook = window.XLSX.read(data, { type: 'array', cellDates: true, cellText: true });
                const sheet = workbook.Sheets[workbook.SheetNames[0]];
                const range = window.XLSX.utils.decode_range(sheet['!ref']);
                
                const mergedData = new Map();

                for (let r = 10; r <= range.e.r; r += 2) {
                  const rawB = getCellValue(sheet, r, 1);
                  let rawF = getCellValue(sheet, r, 5) || getCellValue(sheet, r, 4) || getCellValue(sheet, r, 6);
                  const rawV = getCellValue(sheet, r, 21);
                  const rawD = getCellValue(sheet, r, 3);
                  const rawR = getCellValue(sheet, r, 17);

                  if (rawB || rawF || rawV) {
                    const bulan = getMonthName(rawB);
                    const bpjsKey = rawR ? String(rawR).trim() : `NO_BPJS_${r}`;

                    if (!mergedData.has(bpjsKey)) {
                      const newRow = {
                        'Baris': r + 1,
                        'Data_Pasien': String(rawF || "-"),
                        'Data_D': String(rawD || "-"),
                        'Data_R': String(rawR || "-")
                      };
                      months.forEach(m => newRow[m] = ""); 
                      mergedData.set(bpjsKey, newRow);
                    }

                    const record = mergedData.get(bpjsKey);
                    const status = String(rawV || "-");

                    if (months.includes(bulan) && status !== "-") {
                      record[bulan] = status;
                    }
                  }
                }
                resolve({ fileName: file.name, data: Array.from(mergedData.values()) });
              };
              reader.readAsArrayBuffer(file);
            });
          };

          const processProlanisFile = (file) => {
            return new Promise((resolve) => {
              const reader = new FileReader();
              reader.onload = (e) => {
                const data = new Uint8Array(e.target.result);
                const workbook = window.XLSX.read(data, { type: 'array', cellDates: true, cellText: true });
                const sheet = workbook.Sheets[workbook.SheetNames[0]];
                const range = window.XLSX.utils.decode_range(sheet['!ref']);
                
                const mergedProlanisData = new Map();
                
                for (let r = 13; r <= range.e.r; r++) {
                    const nik = getCellValue(sheet, r, 4); // Kolom E (NIK)
                    const nama = getCellValue(sheet, r, 2); // Kolom C (Nama)
                    const bpjs = getCellValue(sheet, r, 23); // Kolom X (No BPJS)
                    
                    // Lewati baris jika benar-benar kosong
                    if (!nik && !nama && !bpjs) continue;
                    
                    // Gunakan NIK sebagai Key. Jika NIK kosong, gunakan index baris agar tetap terbaca.
                    const nikKey = nik ? String(nik).trim() : `NO_NIK_${r}`;
                    
                    // Hanya masukkan data jika NIK tersebut belum ada di dalam Map
                    if (!mergedProlanisData.has(nikKey)) {
                        mergedProlanisData.set(nikKey, {
                            'Nama': nama, 
                            'NIK': nik, 
                            'No Tlp': getCellValue(sheet, r, 7),
                            'Jenis Kelamin': getCellValue(sheet, r, 8), 
                            'Alamat': getCellValue(sheet, r, 9), 
                            'RT/RW': getCellValue(sheet, r, 10),
                            'Kecamatan': getCellValue(sheet, r, 11), 
                            'Kelurahan': getCellValue(sheet, r, 12), 
                            'Tgl Lahir': getCellValue(sheet, r, 13),
                            'Usia': getCellValue(sheet, r, 14), 
                            'No BPJS': bpjs, 
                            'Peserta Prolanis': getCellValue(sheet, r, 36)
                        });
                    }
                }
                resolve({ fileName: file.name, data: Array.from(mergedProlanisData.values()) });
              };
              reader.readAsArrayBuffer(file);
            });
          };

          const handleUpload = async (e, type) => {
            const files = Array.from(e.target.files);
            if (!files.length) return;
            setIsProcessing(true);
            try {
              const processor = type === 'LAB' ? processLabFile : processProlanisFile;
              const results = await Promise.all(files.filter(f => f.name.match(/\.(xlsx|xls|csv)$/i)).map(processor));
              
              if (type === 'LAB') {
                setLabFilesData(prev => [...prev, ...results]);
                setActiveTab('PROLANIS'); 
              } else {
                setProlanisFilesData(prev => [...prev, ...results]);
                setActiveTab('DASHBOARD'); 
              }
            } catch (err) { console.error(err); } finally { setIsProcessing(false); }
          };

          const downloadFile = (data, type) => {
            const XLSX = window.XLSX;
            if (!XLSX) return;
            const wb = XLSX.utils.book_new();

            if(type === 'LAB'){
                const allRows = data.flatMap(f => f.data);
                const excelData = allRows.map(row => {
                    const outputRow = { 'Nama Pasien': row.Data_Pasien, 'NIK': row.Data_D, 'No BPJS': row.Data_R };
                    months.forEach(m => outputRow[m] = row[m] || "");
                    return outputRow;
                });
                const ws = XLSX.utils.json_to_sheet(excelData, { origin: "A1" });
                XLSX.utils.book_append_sheet(wb, ws, "Rekap Lab Terfilter");
                XLSX.writeFile(wb, `Rekap_Lab_SMART_DM.xlsx`);
            } else {
                const allRows = data.flatMap(f => f.data);
                const groups = allRows.reduce((acc, row) => {
                    const key = row['Kelurahan'] ? String(row['Kelurahan']) : "Tanpa_Kelurahan";
                    if (!acc[key]) acc[key] = [];
                    acc[key].push(row);
                    return acc;
                }, {});
                
                Object.keys(groups).forEach(key => {
                    const ws = XLSX.utils.json_to_sheet(groups[key]);
                    XLSX.utils.book_append_sheet(wb, ws, key.substring(0, 31)); 
                });
                XLSX.writeFile(wb, `Rekap_Prolanis_SMART_DM.xlsx`);
            }
          };

          const getTotalRows = (dataArray) => dataArray.reduce((acc, file) => acc + file.data.length, 0);

          return (
            <div className="pb-24 font-sans text-slate-300">
              {/* Navbar Profesional */}
              <nav className="glass-panel sticky top-0 z-40 border-b border-white/5 shadow-2xl">
                <div className="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
                  <div className="flex items-center gap-4">
                    <div className="bg-indigo-600 p-2.5 rounded-xl shadow-lg shadow-indigo-600/20">
                      <Stethoscope className="w-6 h-6 text-white" />
                    </div>
                    <div>
                      <h1 className="text-2xl font-bold text-white tracking-tight leading-none">SMART DM</h1>
                      <p className="text-[10px] uppercase tracking-widest text-indigo-400 font-semibold mt-1">Sistem Monitoring Pasien</p>
                    </div>
                  </div>
                  
                  <div className="hidden md:flex bg-slate-900/50 p-1 rounded-xl border border-white/5">
                    {[
                      { id: 'LAB', icon: Database, label: '1. Data Lab' },
                      { id: 'PROLANIS', icon: Users, label: '2. Prolanis' },
                      { id: 'DASHBOARD', icon: LayoutDashboard, label: 'Dashboard' }
                    ].map(tab => (
                      <button 
                        key={tab.id}
                        onClick={() => setActiveTab(tab.id)} 
                        className={`flex items-center gap-2 px-5 py-2.5 rounded-lg text-sm font-semibold transition-all duration-300 ${activeTab === tab.id ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-400 hover:text-white hover:bg-white/5'}`}
                      >
                        <tab.icon size={16} /> {tab.label}
                      </button>
                    ))}
                  </div>
                </div>
              </nav>

              <main className="max-w-7xl mx-auto px-6 pt-10 animate-in fade-in slide-in-from-bottom-4 duration-500">
                
                {/* TAB 1: LAB */}
                {activeTab === 'LAB' && (
                  <div className="max-w-3xl mx-auto">
                    <div className="glass-panel p-10 rounded-[2rem] text-center shadow-xl">
                      <div className="bg-indigo-500/10 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-6">
                        <Database className="w-10 h-10 text-indigo-400" />
                      </div>
                      <h2 className="text-3xl font-bold text-white mb-3">Langkah 1: Upload Data Lab</h2>
                      <p className="text-slate-400 mb-10 text-sm leading-relaxed">Unggah folder yang berisi rekapitulasi data laboratorium. Sistem akan mengekstrak, membersihkan duplikat, dan merekap data per pasien secara otomatis.</p>
                      
                      <label className="group relative block w-full border-2 border-dashed border-slate-700 hover:border-indigo-500 bg-slate-900/50 hover:bg-indigo-500/5 transition-all duration-300 rounded-3xl p-12 cursor-pointer">
                        <div className="flex flex-col items-center gap-4">
                          <FolderOpen className="w-12 h-12 text-slate-500 group-hover:text-indigo-400 transition-colors" />
                          <div className="bg-indigo-600 text-white px-8 py-3 rounded-full font-bold text-sm shadow-lg hover:bg-indigo-500 transition-colors">
                            Pilih Folder Lab
                          </div>
                        </div>
                        <input type="file" multiple webkitdirectory="true" className="hidden" onChange={(e) => handleUpload(e, 'LAB')} />
                      </label>

                      {labFilesData.length > 0 && (
                        <div className="mt-8 flex items-center justify-center gap-2 text-sm text-emerald-400 font-medium bg-emerald-500/10 py-3 px-6 rounded-full border border-emerald-500/20 w-max mx-auto">
                          <CheckCircle2 size={18} /> {labFilesData.length} File berhasil diproses
                        </div>
                      )}
                    </div>
                  </div>
                )}

                {/* TAB 2: PROLANIS */}
                {activeTab === 'PROLANIS' && (
                  <div className="max-w-3xl mx-auto">
                    <div className="glass-panel p-10 rounded-[2rem] text-center shadow-xl">
                      <div className="bg-emerald-500/10 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-6">
                        <Users className="w-10 h-10 text-emerald-400" />
                      </div>
                      <h2 className="text-3xl font-bold text-white mb-3">Langkah 2: Upload Data Prolanis</h2>
                      <p className="text-slate-400 mb-10 text-sm leading-relaxed">Unggah folder Prolanis untuk memvalidasi data Lab. Pasien Lab yang tidak tercatat di Prolanis (berdasarkan 8 digit akhir No BPJS) akan otomatis dieliminasi.</p>
                      
                      <label className="group relative block w-full border-2 border-dashed border-slate-700 hover:border-emerald-500 bg-slate-900/50 hover:bg-emerald-500/5 transition-all duration-300 rounded-3xl p-12 cursor-pointer">
                        <div className="flex flex-col items-center gap-4">
                          <FolderOpen className="w-12 h-12 text-slate-500 group-hover:text-emerald-400 transition-colors" />
                          <div className="bg-emerald-600 text-white px-8 py-3 rounded-full font-bold text-sm shadow-lg hover:bg-emerald-500 transition-colors">
                            Pilih Folder Prolanis
                          </div>
                        </div>
                        <input type="file" multiple webkitdirectory="true" className="hidden" onChange={(e) => handleUpload(e, 'PROLANIS')} />
                      </label>

                      {prolanisFilesData.length > 0 && (
                        <div className="mt-8 flex items-center justify-center gap-2 text-sm text-emerald-400 font-medium bg-emerald-500/10 py-3 px-6 rounded-full border border-emerald-500/20 w-max mx-auto">
                          <CheckCircle2 size={18} /> {prolanisFilesData.length} File berhasil diproses
                        </div>
                      )}
                    </div>
                  </div>
                )}

                {/* TAB 3: DASHBOARD */}
                {activeTab === 'DASHBOARD' && (
                  <div className="space-y-6">
                    {/* Statistik Utama */}
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                      <div className="glass-panel p-6 rounded-2xl flex items-center gap-5">
                        <div className="bg-slate-800 p-4 rounded-xl"><FileText className="w-7 h-7 text-slate-400" /></div>
                        <div>
                          <p className="text-sm font-medium text-slate-400">Total Baris Lab</p>
                          <p className="text-3xl font-bold text-white">{getTotalRows(labFilesData)}</p>
                        </div>
                      </div>
                      <div className="glass-panel p-6 rounded-2xl flex items-center gap-5">
                        <div className="bg-slate-800 p-4 rounded-xl"><Users className="w-7 h-7 text-slate-400" /></div>
                        <div>
                          <p className="text-sm font-medium text-slate-400">Total Baris Prolanis</p>
                          <p className="text-3xl font-bold text-white">{getTotalRows(prolanisFilesData)}</p>
                        </div>
                      </div>
                      <div className="bg-gradient-to-br from-indigo-900/80 to-blue-900/80 p-6 rounded-2xl border border-indigo-500/30 flex items-center gap-5 shadow-lg shadow-indigo-900/20">
                        <div className="bg-indigo-500/20 p-4 rounded-xl"><CheckCircle2 className="w-7 h-7 text-indigo-300" /></div>
                        <div>
                          <p className="text-sm font-medium text-indigo-200">Data Valid (Cocok)</p>
                          <p className="text-3xl font-bold text-white">{getTotalRows(filteredLabData)}</p>
                        </div>
                      </div>
                    </div>

                    {/* Kontrol dan Download */}
                    <div className="glass-panel p-6 rounded-2xl flex flex-col lg:flex-row items-center justify-between gap-6">
                      <div className="flex items-start gap-4">
                        <div className="bg-blue-500/10 p-2 rounded-lg shrink-0 mt-1"><Info className="w-5 h-5 text-blue-400" /></div>
                        <p className="text-sm text-slate-400 leading-relaxed max-w-2xl">
                          Tabel di bawah ini menampilkan hasil gabungan data laboratorium. Hanya pasien dengan <strong className="text-slate-200">8 digit akhir No BPJS</strong> yang tercatat di dokumen Prolanis yang dipertahankan.
                        </p>
                      </div>
                      <div className="flex gap-4 w-full lg:w-auto">
                        <button onClick={() => downloadFile(filteredLabData, 'LAB')} disabled={filteredLabData.length === 0} className="flex-1 flex items-center justify-center gap-2 bg-indigo-600 hover:bg-indigo-500 disabled:bg-slate-800 disabled:text-slate-500 text-white px-6 py-3 rounded-xl text-sm font-bold shadow-lg transition-colors whitespace-nowrap">
                          <Download size={16} /> Unduh Rekap Lab
                        </button>
                        <button onClick={() => downloadFile(prolanisFilesData, 'PROLANIS')} disabled={prolanisFilesData.length === 0} className="flex-1 flex items-center justify-center gap-2 bg-emerald-600 hover:bg-emerald-500 disabled:bg-slate-800 disabled:text-slate-500 text-white px-6 py-3 rounded-xl text-sm font-bold shadow-lg transition-colors whitespace-nowrap">
                          <Download size={16} /> Unduh Prolanis
                        </button>
                      </div>
                    </div>

                    {/* Tabel Data */}
                    {filteredLabData.length === 0 ? (
                      <div className="glass-panel py-24 flex flex-col items-center justify-center text-center rounded-[2rem]">
                        <AlertCircle className="w-16 h-16 text-slate-600 mb-6" />
                        <h3 className="text-xl font-bold text-slate-300 mb-2">Belum Ada Data Tersedia</h3>
                        <p className="text-slate-500 text-sm">Pastikan Anda telah mengunggah file Lab dan Prolanis yang valid.</p>
                      </div>
                    ) : (
                      <div className="glass-panel rounded-[2rem] overflow-hidden shadow-2xl border border-slate-700">
                        <div className="bg-slate-800/80 px-6 py-4 flex items-center justify-between border-b border-slate-700">
                          <h3 className="font-bold text-white flex items-center gap-2"><BarChart3 className="text-indigo-400 w-5 h-5"/> Pratinjau Rekapitulasi</h3>
                        </div>
                        <div className="overflow-x-auto max-h-[600px] relative">
                          <table className="w-full text-left text-sm whitespace-nowrap">
                            <thead className="bg-slate-900/90 text-slate-400 font-semibold sticky top-0 z-10 backdrop-blur-md shadow-sm">
                              <tr>
                                <th className="px-6 py-4 border-b border-slate-700">Nama Pasien</th>
                                <th className="px-6 py-4 border-b border-slate-700">NIK</th>
                                <th className="px-6 py-4 border-b border-slate-700">No BPJS</th>
                                {months.map(m => <th key={m} className="px-6 py-4 border-b border-slate-700 text-center">{m.substring(0,3)}</th>)}
                              </tr>
                            </thead>
                            <tbody className="divide-y divide-slate-800/50 text-slate-300 bg-slate-900/30">
                              {filteredLabData.flatMap(f => f.data).map((row, r) => (
                                <tr key={r} className="hover:bg-slate-800/60 transition-colors">
                                  <td className="px-6 py-4 font-medium text-white">{row.Data_Pasien}</td>
                                  <td className="px-6 py-4 text-slate-400">{row.Data_D}</td>
                                  <td className="px-6 py-4 font-mono text-slate-400">{row.Data_R}</td>
                                  {months.map(m => (
                                    <td key={m} className="px-6 py-4 text-center">
                                      {row[m] ? (
                                        <span className="inline-flex items-center justify-center px-2.5 py-1 bg-indigo-500/10 text-indigo-300 text-xs font-semibold rounded-md border border-indigo-500/20">
                                          {row[m]}
                                        </span>
                                      ) : (
                                        <span className="text-slate-600">-</span>
                                      )}
                                    </td>
                                  ))}
                                </tr>
                              ))}
                            </tbody>
                          </table>
                        </div>
                      </div>
                    )}
                  </div>
                )}
              </main>

              {/* Loader */}
              {isProcessing && (
                <div className="fixed inset-0 z-50 bg-slate-950/90 backdrop-blur-sm flex flex-col items-center justify-center text-white">
                  <Loader2 className="w-16 h-16 text-indigo-500 animate-spin mb-8" />
                  <h2 className="text-2xl font-bold tracking-widest uppercase text-white mb-2">Memproses Data</h2>
                  <p className="text-slate-400 text-sm">Menyesuaikan file dan membersihkan duplikat...</p>
                </div>
              )}
            </div>
          );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
