<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SMART DM</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script>
    Babel.registerPreset('react-classic', {
      presets: [
        [Babel.availablePresets['react'], { "runtime": "classic" }]
      ]
    });
  </script>
  
  <!-- SheetJS -->
  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
  
  <!-- Chart.js untuk Dashboard Grafik -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@0.288.0/dist/umd/lucide.min.js"></script>

  <style>
    ::-webkit-scrollbar {
      display: none;
      width: 0;
      height: 0;
    }
    * {
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    @keyframes float {
      0% { transform: translate(0px, 0px) scale(1); }
      33% { transform: translate(40px, -60px) scale(1.15); }
      66% { transform: translate(-30px, 30px) scale(0.9); }
      100% { transform: translate(0px, 0px) scale(1); }
    }
    
    @keyframes menuFloat {
      0% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-6px) rotate(0.5deg); }
      100% { transform: translateY(0px) rotate(0deg); }
    }
    
    @keyframes panelFloat {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
      100% { transform: translateY(0px); }
    }

    .floating-menu { animation: menuFloat 6s ease-in-out infinite; }
    .floating-panel-delay-0 { animation: panelFloat 7s ease-in-out infinite; }
    .floating-panel-delay-1 { animation: panelFloat 6.5s ease-in-out infinite 1s; }

    .blob {
      position: fixed;
      filter: blur(100px);
      z-index: 0;
      opacity: 0.65;
      animation: float 22s infinite ease-in-out;
      border-radius: 50%;
    }
    .blob-1 { top: -10%; left: -10%; width: 55vw; height: 55vw; background: #bae6fd; animation-delay: 0s; }
    .blob-2 { bottom: -10%; right: -10%; width: 65vw; height: 65vw; background: #bfdbfe; animation-delay: -5s; }
    
    .glass-panel {
      background: rgba(255, 255, 255, 0.45);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.65);
      box-shadow: 0 12px 40px 0 rgba(14, 165, 233, 0.08);
    }
    
    .glass-button {
      background: linear-gradient(135deg, rgba(14, 165, 233, 0.95) 0%, rgba(37, 99, 235, 0.95) 100%);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.4);
      box-shadow: 0 8px 20px -4px rgba(14, 165, 233, 0.35);
      transition: all 0.3s;
    }
  </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 antialiased overflow-x-hidden relative">
  
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const App = () => {
      return (
        <div class="min-h-screen flex flex-col justify-center items-center p-6 relative z-10">
          <div class="glass-panel p-10 rounded-[3rem] text-center max-w-lg w-full">
            <h1 class="text-4xl font-black text-sky-900 mb-4">SMART DM</h1>
            <p class="text-slate-600 mb-8">Sistem Monitoring Diabetes Terintegrasi. Silakan klik Preview untuk menjalankan aplikasi.</p>
            <button class="glass-button w-full py-4 rounded-2xl text-white font-bold shadow-xl">Panel Aplikasi</button>
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
